<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pilot Station Phase II | Coming October 2026 · Goldsboro, NC</title>
  </head>
  <body>
    <div id="app"></div>

    <!-- Hidden Netlify form so Netlify can register the SPA form -->
    <form name="interest" method="POST" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="interestType">
        <option value="join">Join pre-leasing list</option>
        <option value="showing">Request a showing</option>
      </select>
      <input type="text" name="property" />
      <input type="text" name="propertyName" />
      <input type="text" name="listType" />
      <textarea name="details"></textarea>
    </form>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
